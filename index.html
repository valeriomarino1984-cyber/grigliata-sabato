<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🍖 Grigliata Sabato Sera</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a0a00; font-family: Georgia, 'Times New Roman', serif; color: #f5e6c8; }
    input::placeholder { color: #555; }
    input:focus { outline: none; border-color: #ff6b35 !important; }
    button:active { opacity: 0.8; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a0a00; }
    ::-webkit-scrollbar-thumb { background: #ff6b3566; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;

const STORAGE_KEY = "grigliata_sabato_v3";
const JSONBIN_ID = "6a0c6452ee5a733b12e49c51";
const JSONBIN_KEY = "$2a$10$J.bXwvFUYWzNGc7NOtsmGOr84WBRMMLhUlccLFPp5Qhnh7Ic2/Q6K";

const CATEGORIE_DEFAULT = [
  { id:"carne", emoji:"🥩", nome:"Carne", colore:"#c0392b", items:[
    { id:"s1", testo:"Salsicce", qty:"1 kg", fatto:false },
    { id:"s2", testo:"Costine di maiale", qty:"1 kg", fatto:false },
    { id:"s3", testo:"Pollo (ali/cosce)", qty:"1 kg", fatto:false },
    { id:"s4", testo:"Hamburger", qty:"8 pz", fatto:false },
    { id:"s5", testo:"Arrosticini", qty:"50 pz", fatto:false },
  ]},
  { id:"contorni", emoji:"🥗", nome:"Contorni & Antipasti", colore:"#27ae60", items:[
    { id:"c1", testo:"Pane / bruschette", qty:"2 filoni", fatto:false },
    { id:"c2", testo:"Zucchine e peperoni", qty:"1 kg", fatto:false },
    { id:"c3", testo:"Insalata", qty:"2 cespi", fatto:false },
    { id:"c4", testo:"Affettati / formaggi", qty:"500 g", fatto:false },
  ]},
  { id:"bevande", emoji:"🍺", nome:"Bevande", colore:"#f39c12", items:[
    { id:"b1", testo:"Birra", qty:"2 conf.", fatto:false },
    { id:"b2", testo:"Vino", qty:"2 bottiglie", fatto:false },
    { id:"b3", testo:"Acqua nat. e frizzante", qty:"6 bottiglie", fatto:false },
    { id:"b4", testo:"Bibite analcoliche", qty:"1 conf.", fatto:false },
  ]},
  { id:"accessori", emoji:"🧻", nome:"Accessori", colore:"#8e44ad", items:[
    { id:"a1", testo:"Carbonella / bricchetti", qty:"3 kg", fatto:false },
    { id:"a2", testo:"Accendifuoco", qty:"1 pz", fatto:false },
    { id:"a3", testo:"Piatti e bicchieri carta", qty:"20 pz", fatto:false },
    { id:"a4", testo:"Posate usa e getta", qty:"20 set", fatto:false },
    { id:"a5", testo:"Sacchi spazzatura", qty:"5 pz", fatto:false },
  ]},
  { id:"dolce", emoji:"🍦", nome:"Dolce", colore:"#e91e8c", items:[
    { id:"d1", testo:"Gelato / anguria", qty:"q.b.", fatto:false },
  ]},
  { id:"postcena", emoji:"🎉", nome:"Post cena", colore:"#1565c0", items:[
    { id:"p1", testo:"Ammazzacaffè", qty:"1 bottiglia", fatto:false },
    { id:"p2", testo:"Sigari / sigaretti", qty:"q.b.", fatto:false },
    { id:"p3", testo:"Grappa", qty:"1 bottiglia", fatto:false },
    { id:"p4", testo:"Giochi di carte", qty:"1 mazzo", fatto:false },
    { id:"p5", testo:"Musica / casse bluetooth", qty:"1 pz", fatto:false },
  ]},
];

async function remoteLoad() {
  if (!JSONBIN_ID) return null;
  try {
    const r = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}/latest`, {
      headers: { "X-Master-Key": JSONBIN_KEY }
    });
    if (!r.ok) return null;
    const j = await r.json();
    const data = j.record?.categorie;
    if (!data || !Array.isArray(data) || data.length === 0) return null;
    return data;
  } catch { return null; }
}

async function remoteSave(categorie) {
  if (!JSONBIN_ID) return;
  try {
    await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_ID}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json", "X-Master-Key": JSONBIN_KEY },
      body: JSON.stringify({ categorie })
    });
  } catch {}
}

function genId() { return Math.random().toString(36).slice(2, 9); }

function App() {
  const [categorie, setCategorie] = useState(null);
  const [nuovaVoce, setNuovaVoce] = useState({});
  const [nuovaQty, setNuovaQty] = useState({});
  const [loading, setLoading] = useState(true);
  const [lastSync, setLastSync] = useState(null);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    async function init() {
      let data = await remoteLoad();
      if (!data) {
        const local = localStorage.getItem(STORAGE_KEY);
        data = local ? JSON.parse(local) : CATEGORIE_DEFAULT;
      }
      setCategorie(data);
      setLoading(false);
    }
    init();
    const interval = setInterval(async () => {
      const data = await remoteLoad();
      if (data) {
        setCategorie(data);
        setLastSync(new Date().toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" }));
      }
    }, 15000);
    return () => clearInterval(interval);
  }, []);

  const salva = useCallback(async (nuove) => {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(nuove));
    await remoteSave(nuove);
  }, []);

  function aggiornaItem(catId, itemId, campo, valore) {
    setCategorie(prev => {
      const nuove = prev.map(cat =>
        cat.id !== catId ? cat : {
          ...cat,
          items: cat.items.map(it =>
            it.id !== itemId ? it : { ...it, [campo]: valore }
          )
        }
      );
      salva(nuove);
      return nuove;
    });
  }

  function toggleFatto(catId, itemId) {
    const cat = categorie.find(c => c.id === catId);
    const item = cat?.items.find(i => i.id === itemId);
    if (!item) return;
    aggiornaItem(catId, itemId, "fatto", !item.fatto);
  }

  function aggiungiVoce(catId) {
    const testo = (nuovaVoce[catId] || "").trim();
    if (!testo) return;
    const qty = (nuovaQty[catId] || "").trim() || "—";
    setCategorie(prev => {
      const nuove = prev.map(cat =>
        cat.id !== catId ? cat : {
          ...cat,
          items: [...cat.items, { id: genId(), testo, qty, fatto: false }]
        }
      );
      salva(nuove);
      return nuove;
    });
    setNuovaVoce(v => ({ ...v, [catId]: "" }));
    setNuovaQty(v => ({ ...v, [catId]: "" }));
  }

  function eliminaVoce(catId, itemId) {
    setCategorie(prev => {
      const nuove = prev.map(cat =>
        cat.id !== catId ? cat : { ...cat, items: cat.items.filter(i => i.id !== itemId) }
      );
      salva(nuove);
      return nuove;
    });
  }

  async function salvaEAggiorna() {
    setSaving(true);
    localStorage.clear();
    await salva(categorie);
    const data = await remoteLoad();
    if (data) setCategorie(data);
    setSaving(false);
    setLastSync(new Date().toLocaleTimeString("it-IT", { hour:"2-digit", minute:"2-digit" }));
  }

  if (loading) return (
    <div style={{ minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center",
      background:"#1a0a00", color:"#fff", fontSize:20 }}>
      🍖 Caricamento lista...
    </div>
  );

  const tutti = categorie.flatMap(c => c.items);
  const totale = tutti.length;
  const fatti = tutti.filter(i => i.fatto).length;

  return (
    <div style={{ minHeight:"100vh", background:"linear-gradient(160deg,#1a0a00 0%,#2d1200 40%,#1a0a00 100%)", paddingBottom:60 }}>

      {/* HEADER */}
      <div style={{ background:"linear-gradient(135deg,#8b2500,#c0390a,#8b2500)", padding:"28px 20px 20px",
        textAlign:"center", borderBottom:"3px solid #ff6b35", boxShadow:"0 4px 20px rgba(0,0,0,.5)" }}>
        <div style={{ fontSize:44 }}>🍖🪵🥩</div>
        <h1 style={{ fontSize:"clamp(20px,5vw,34px)", fontWeight:"bold", letterSpacing:2,
          color:"#ffe0b2", textShadow:"0 2px 8px rgba(0,0,0,.5)", margin:"4px 0" }}>
          GRIGLIATA SABATO SERA
        </h1>
        <p style={{ color:"#ffb87a", fontSize:14, letterSpacing:1 }}>Lista della spesa 🛒</p>

        <div style={{ display:"flex", justifyContent:"center", gap:28, marginTop:16 }}>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:22, fontWeight:"bold", color:"#ff6b35" }}>{fatti}/{totale}</div>
            <div style={{ fontSize:11, color:"#ffb87a" }}>Già preso</div>
          </div>
          <div style={{ textAlign:"center" }}>
            <div style={{ fontSize:22, fontWeight:"bold", color:"#4caf50" }}>{totale - fatti}</div>
            <div style={{ fontSize:11, color:"#ffb87a" }}>Da prendere</div>
          </div>
        </div>

        {/* Barra progresso */}
        <div style={{ maxWidth:300, margin:"12px auto 0", background:"rgba(0,0,0,.4)",
          borderRadius:99, height:10, overflow:"hidden" }}>
          <div style={{ width:`${totale ? (fatti/totale)*100 : 0}%`,
            background:"linear-gradient(90deg,#ff6b35,#4caf50)", height:"100%",
            borderRadius:99, transition:"width .4s" }} />
        </div>

        {lastSync && <p style={{ color:"#555", fontSize:11, marginTop:8 }}>↻ Aggiornato alle {lastSync}</p>}
      </div>

      <div style={{ maxWidth:600, margin:"0 auto", padding:"0 14px" }}>

        <p style={{ textAlign:"center", color:"#666", fontSize:12, margin:"16px 0 12px" }}>
          Spunta ✓ quando hai preso la cosa · modifica le quantità direttamente
        </p>

        {/* CATEGORIE */}
        {categorie.map(cat => {
          const fattiCat = cat.items.filter(i => i.fatto).length;
          return (
            <div key={cat.id} style={{ background:"rgba(255,255,255,.04)",
              border:`1px solid ${cat.colore}44`, borderRadius:14, marginBottom:16, overflow:"hidden" }}>

              {/* Header categoria */}
              <div style={{ background:`linear-gradient(90deg,${cat.colore}33,transparent)`,
                padding:"12px 18px", borderBottom:`1px solid ${cat.colore}22`,
                display:"flex", alignItems:"center", gap:10 }}>
                <span style={{ fontSize:22 }}>{cat.emoji}</span>
                <span style={{ fontWeight:"bold", fontSize:16, color:"#ffe0b2", flex:1 }}>{cat.nome}</span>
                <span style={{ fontSize:12, color: fattiCat === cat.items.length && cat.items.length > 0 ? "#4caf50" : "#666" }}>
                  {fattiCat}/{cat.items.length} ✓
                </span>
              </div>

              {/* Voci */}
              <div>
                {cat.items.map((item, idx) => (
                  <div key={item.id} style={{
                    display:"flex", alignItems:"center", gap:10,
                    padding:"11px 14px",
                    background: item.fatto ? "rgba(76,175,80,0.06)" : idx % 2 === 0 ? "rgba(255,255,255,.02)" : "transparent",
                    borderBottom:"1px solid rgba(255,255,255,.04)",
                    transition:"background .2s"
                  }}>

                    {/* Checkbox */}
                    <button onClick={() => toggleFatto(cat.id, item.id)} style={{
                      width:30, height:30, borderRadius:8, flexShrink:0,
                      border:`2px solid ${item.fatto ? "#4caf50" : "#444"}`,
                      background: item.fatto ? "#4caf50" : "transparent",
                      color: "#fff", cursor:"pointer", fontSize:16,
                      display:"flex", alignItems:"center", justifyContent:"center",
                      transition:"all .2s"
                    }}>
                      {item.fatto ? "✓" : ""}
                    </button>

                    {/* Nome voce */}
                    <span style={{
                      flex:1, fontSize:15,
                      textDecoration: item.fatto ? "line-through" : "none",
                      color: item.fatto ? "#555" : "#f5e6c8",
                      transition:"all .2s"
                    }}>{item.testo}</span>

                    {/* Quantità editabile */}
                    <input
                      value={item.qty || ""}
                      onChange={e => aggiornaItem(cat.id, item.id, "qty", e.target.value)}
                      style={{
                        width:90, background: item.fatto ? "rgba(0,0,0,.2)" : "rgba(0,0,0,.35)",
                        border:`1px solid ${item.fatto ? "#333" : cat.colore + "66"}`,
                        borderRadius:8, padding:"5px 10px",
                        color: item.fatto ? "#555" : "#ffb87a",
                        fontSize:13, textAlign:"center",
                        fontFamily:"Georgia,serif",
                      }}
                    />

                    {/* Elimina */}
                    <button onClick={() => eliminaVoce(cat.id, item.id)} style={{
                      background:"none", border:"none", color:"#333",
                      cursor:"pointer", fontSize:20, lineHeight:1,
                      flexShrink:0, padding:"0 2px"
                    }}>×</button>
                  </div>
                ))}

                {/* Aggiungi voce */}
                <div style={{ display:"flex", gap:6, padding:"10px 12px", background:"rgba(0,0,0,.15)" }}>
                  <input value={nuovaVoce[cat.id]||""} placeholder="Aggiungi voce..."
                    onChange={e => setNuovaVoce(v => ({ ...v, [cat.id]: e.target.value }))}
                    onKeyDown={e => e.key === "Enter" && aggiungiVoce(cat.id)}
                    style={{ flex:2, minWidth:80, background:"rgba(0,0,0,.3)",
                      border:`1px solid ${cat.colore}44`, borderRadius:8,
                      padding:"8px 10px", color:"#f5e6c8", fontSize:13 }} />
                  <input value={nuovaQty[cat.id]||""} placeholder="Qtà..."
                    onChange={e => setNuovaQty(v => ({ ...v, [cat.id]: e.target.value }))}
                    onKeyDown={e => e.key === "Enter" && aggiungiVoce(cat.id)}
                    style={{ width:70, background:"rgba(0,0,0,.3)",
                      border:`1px solid ${cat.colore}44`, borderRadius:8,
                      padding:"8px 8px", color:"#ffb87a", fontSize:13 }} />
                  <button onClick={() => aggiungiVoce(cat.id)} style={{
                    background:`${cat.colore}55`, border:`1px solid ${cat.colore}`,
                    borderRadius:8, padding:"8px 14px", color:"#fff",
                    cursor:"pointer", fontSize:20, flexShrink:0
                  }}>+</button>
                </div>
              </div>
            </div>
          );
        })}

        {/* PULSANTE SALVA */}
        <div style={{ textAlign:"center", marginTop:24, marginBottom:8 }}>
          <button onClick={salvaEAggiorna} disabled={saving} style={{
            background: saving ? "#333" : "linear-gradient(135deg,#1a3a6b,#1565c0)",
            border:"1px solid #42a5f5", borderRadius:10, padding:"13px 32px",
            color: saving ? "#666" : "#e3f2fd", fontFamily:"Georgia,serif",
            fontSize:15, cursor: saving ? "default" : "pointer", letterSpacing:1,
            boxShadow:"0 2px 12px rgba(21,101,192,.4)", transition:"all .2s"
          }}>
            {saving ? "⏳ Salvataggio..." : "🔄 Salva & Aggiorna lista"}
          </button>
          <p style={{ color:"#444", fontSize:11, marginTop:8 }}>
            Premi per sincronizzare con tutti
          </p>
        </div>

        <p style={{ textAlign:"center", color:"#2a1500", fontSize:12, marginTop:12 }}>
          🍖 Grigliata Sabato Sera · Lista condivisa
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
